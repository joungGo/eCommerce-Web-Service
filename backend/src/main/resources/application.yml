spring:
  application:
    name: eCommerce-Web-Service
  profiles:
    active: dev
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: c2VjcmV0LWtleS1mb3ItanNvbi13ZWItdG9rZW4tc2lnbmluZy1rZXktZm9yLXNwcmluZy1zZWN1cml0eS1qd3Q=
  token-validity-in-seconds: 86400 # JWT 토큰의 유효 기간
  issuer: eCommerce-Web-Service

logging:
  level:
    com.example.ecommercewebservice: DEBUG
    org.springframework.security: INFO
